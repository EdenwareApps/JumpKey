<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>JumpKey for YouTube</title>
  <style>
    body {
      margin: 0;
      font-size: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafafa;
      color: #111;
      display: flex;
      flex-direction: column;
      min-height: 100vh;   
    }

    :root {
      --secondary-bg: transparent;
      --main-bg: #fff;
      --main-shadow: 0 18px 50px rgba(0,0,0,.12);
      --button-bg: #0073e6;
      --button-border: rgba(0,0,0,.15);
      --button-text: #fff;
      --secondary-text: rgba(0,0,0,.85);
      --footer-color: rgba(0,0,0,.65);
      --footer-link-color: inherit;
    }

    /* Dark theme support */
    @media (prefers-color-scheme: dark) {
      body {
        background: #111;
        color: #eee;
        --main-bg: #1c1c1c;
        --main-shadow: 0 18px 50px rgba(0,0,0,.65);
        --button-bg: #2962ff;
        --button-border: rgba(255,255,255,.18);
        --button-text: #fff;
        --secondary-bg: rgba(255,255,255,.08);
        --secondary-text: rgba(255,255,255,.85);
        --footer-color: rgba(255,255,255,.65);
        --footer-link-color: rgba(255,255,255,.9);
      }
      :root {
        --main-bg: #1c1c1c;
        --main-shadow: 0 18px 50px rgba(0,0,0,.65);
        --button-bg: #2962ff;
        --button-border: rgba(255,255,255,.18);
        --button-text: #fff;
        --secondary-text: rgba(255,255,255,.85);
        --footer-color: rgba(255,255,255,.65);
        --footer-link-color: rgba(255,255,255,.9);
      }
    }

    main {
      margin: auto;
      max-width: 520px;
      padding: 24px;
      background: var(--main-bg, #fff);
      border-radius: 14px;
      box-shadow: var(--main-shadow, 0 18px 50px rgba(0,0,0,.12));
    }

    h1 {
      font-size: 1.5rem;
      margin: 0 0 0.5rem;
    }

    p {
      line-height: 1.5;
      margin: 0.75rem 0;
    }

    .buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 1.25rem;
    }

    button {
      flex: 1;
      min-width: 140px;
      padding: 0.65rem 0.9rem;
      border: 1px solid rgba(0,0,0,.15);
      border-radius: 8px;
      background: var(--button-bg, #0073e6);
      color: var(--button-text, #fff);
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    button.secondary {
      background: var(--secondary-bg, transparent);
      border-color: rgba(0,0,0,.18);
      color: var(--secondary-text, rgba(0,0,0,.85));
    }

    button:hover {
      background: #005bb5;
    }

    button.secondary:hover {
      background: rgba(0,0,0,.06);
    }

    .footer {
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--footer-color, rgba(0,0,0,.65));
    }

    .footer a {
      color: var(--footer-link-color, inherit);
      text-decoration: underline;
    }

  </style>
</head>
<body>
  <main>
    <h1 id="title">Welcome to JumpKey for YouTube</h1>
    <p id="description">
      JumpKey for YouTube can automatically make the YouTube window fullscreen when switching between videos. This can help keep your focus on the video and avoid accidental clicks elsewhere.
    </p>
    <p id="note"></p>

    <div class="buttons">
      <button id="enableBtn">Enable fullscreen</button>
      <button class="secondary" id="skipBtn">No thanks</button>
    </div>

    <div class="footer">
      <p>
        <a href="#" id="openOptions">Open Options</a>
      </p>
      <p id="footerText"></p>
    </div>
  </main>

  <script src="welcome.js"></script>
</body>
</html>
